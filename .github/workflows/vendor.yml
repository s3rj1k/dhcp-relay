name: Update Vendor Branch

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  create-vendor-bump-PR:
    name: Update Vendor Branch
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Setup Golang
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Checkout 'main' branch
      uses: actions/checkout@v6
      with:
        ref: main
        path: .main

    - name: Run 'go mod download'
      working-directory: .main
      run: |
        go mod download

    - name: Run 'go mod vendor'
      working-directory: .main
      run: |
        go mod vendor

    - name: Ensure 'vendor' branch exists
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if ! git ls-remote --exit-code --heads "https://github.com/${GITHUB_REPOSITORY}.git" vendor >/dev/null; then
          echo "vendor branch does not exist; creating empty orphan branch"
          tmp="$(mktemp -d)"
          cd "$tmp"
          git init -q -b vendor
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -q -m "Initialize vendor branch"
          git push -q "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" vendor
        fi

    - name: Checkout 'vendor' branch
      uses: actions/checkout@v6
      with:
        ref: vendor
        path: .vendor

    - name: Copy vendoring data to 'vendor' branch
      run: |
        cp .main/go.mod .vendor/go.mod
        cp .main/go.sum .vendor/go.sum
        cp -a .main/vendor .vendor/

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        path: .vendor
        commit-message: 'Update vendor dependencies'
        title: 'Update vendor dependencies'
        base: vendor
        branch: 'update-vendor-${{ github.run_number }}'
        draft: false
