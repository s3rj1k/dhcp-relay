name: Docker Image Build and Push

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  version:
    name: Compute binary version
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.binver.outputs.version }}

    steps:
      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false

      - name: Check out source code
        uses: actions/checkout@v6

      - name: Build and extract version
        id: binver
        run: |
          make build
          version=$(BUILD/dhcp-relay -version 2>&1 | awk 'END{print $NF}')
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: version

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels, annotations) for Docker
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
          annotations: |
            org.opencontainers.image.version=${{ needs.version.outputs.version }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          sbom: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge & Push Manifest
    runs-on: ubuntu-latest
    needs: [version, build]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, annotations) for Docker
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{raw}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
          annotations: |
            org.opencontainers.image.version=${{ needs.version.outputs.version }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          declare -a ANNOTATIONS=()
          while IFS= read -r annotation; do
            [ -n "$annotation" ] || continue
            ANNOTATIONS+=(--annotation "$annotation")
          done < <(jq -r '.annotations[]?' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          docker buildx imagetools create \
            "${ANNOTATIONS[@]}" \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

      - name: Job summary
        if: success()
        env:
          REPO: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          TAG: ${{ steps.meta.outputs.version }}
        run: |
          cat >>"$GITHUB_STEP_SUMMARY" <<EOF
          ## Fetch the binary

          Extract \`dhcp-relay\` from the published image with [ORAS](https://oras.land/), no docker required:

          \`\`\`bash
          oras blob fetch --output - "$REPO@\$(oras manifest fetch --platform linux/amd64 $REPO:$TAG | jq -r '.layers[-1].digest')" | tar -xzO usr/local/bin/dhcp-relay > dhcp-relay && chmod +x dhcp-relay
          \`\`\`

          Swap \`linux/amd64\` for \`linux/arm64\` to fetch the arm64 build.
          EOF
