name: E2E Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  e2e:
    name: E2E Check
    runs-on: ubuntu-latest

    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Check out source code
        uses: actions/checkout@v7

      - name: Classic relay e2e
        run: make test-e2e-relay

      - name: MAC policy e2e
        run: make test-e2e-policy

      - name: Unnumbered relay e2e
        run: make test-e2e-unnumbered

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest

    needs: [e2e]

    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Check out source code
        uses: actions/checkout@v7

      - name: Benchmark classic relay (short debug)
        continue-on-error: true
        run: make test-e2e-bench-short-classic

      - name: Benchmark policy relay (short debug)
        continue-on-error: true
        run: make test-e2e-bench-short-policy

      - name: Benchmark classic relay (long)
        run: make test-e2e-bench-long-classic

      - name: Benchmark policy relay (long)
        run: make test-e2e-bench-long-policy
