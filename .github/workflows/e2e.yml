name: E2E Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  e2e:
    name: E2E Check
    runs-on: ubuntu-latest

    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Check out source code
        uses: actions/checkout@v6

      - name: Classic relay e2e
        run: make test-e2e-relay

      - name: MAC policy e2e
        run: make test-e2e-policy

      - name: Scale gate e2e (classic)
        run: make test-e2e-scale-classic

      - name: Scale gate e2e (policy)
        run: make test-e2e-scale-policy

  benchmark:
    name: Benchmark (informational)
    runs-on: ubuntu-latest

    needs: [e2e]

    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Check out source code
        uses: actions/checkout@v6

      - name: perfdhcp benchmark
        continue-on-error: true
        run: make test-e2e-bench
