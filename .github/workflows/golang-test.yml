name: Go Test Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  golang-test:
    name: Go Test Check
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false

      - name: Check out source code
        uses: actions/checkout@v6

      - name: Test
        run: |
          make test
