name: Go Build Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  golang-build:
    name: Go Build Check (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out source code
        uses: actions/checkout@v7

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build
        run: |
          make build GOARCH=${{ matrix.goarch }}
