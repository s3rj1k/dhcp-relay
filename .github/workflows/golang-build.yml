name: Go Build Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  golang-build:
    name: Go Build Check (${{ matrix.goarch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false

      - name: Check out source code
        uses: actions/checkout@v6

      - name: Build
        run: |
          make build GOARCH=${{ matrix.goarch }}
