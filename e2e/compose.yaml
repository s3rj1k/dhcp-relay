name: dhcp-relay-e2e

# Shared relay config anchor. Mutually exclusive profiles prevent starting both on duplicate static addresses.
x-relay-base: &relay-base
  build:
    context: ../
    dockerfile: Dockerfile
  image: dhcp-relay:e2e
  cap_add:
    - NET_RAW
  networks:
    client-net:
      ipv4_address: 192.168.50.2
    server-net:
      ipv4_address: 10.99.0.2
  depends_on:
    kea:
      condition: service_started

# Shared client config anchor. Probe clients run udhcpc under the probe profile so they never auto start.
x-client-base: &client-base
  image: busybox:latest
  profiles: ["probe"]
  cap_add:
    - NET_RAW
    - NET_ADMIN
  entrypoint: ["udhcpc"]

# Shared netns sidecar anchor. Each init shares a relay netns to add or flush a client-net address.
# The distroless relay image has no shell or ip tool so a sidecar does it.
x-netinit-base: &netinit-base
  build:
    context: .
    dockerfile_inline: |
      FROM debian:13-slim
      RUN apt-get update \
       && apt-get install -y --no-install-recommends iproute2 \
       && rm -rf /var/lib/apt/lists/*
  image: dhcp-relay-netinit:e2e
  cap_add:
    - NET_ADMIN

services:
  kea:
    build:
      context: .
      dockerfile_inline: |
        FROM debian:13-slim
        RUN apt-get update \
         && apt-get install -y --no-install-recommends kea-dhcp4-server \
         && rm -rf /var/lib/apt/lists/* \
         && mkdir -p /run/kea
        COPY --chmod=0755 kea-entrypoint.sh /usr/local/bin/kea-entrypoint.sh
        ENTRYPOINT ["/usr/local/bin/kea-entrypoint.sh"]
    image: dhcp-relay-kea:e2e
    # Reply to the source of each query (our relay) not giaddr. perfdhcp emulates its own relay so
    # without this kea would unicast replies to giaddr and the host would route them around our relay.
    environment:
      KEA_TEST_SEND_RESPONSES_TO_SOURCE: ENABLE
    configs:
      - source: kea-dhcp4
        target: /etc/kea/kea-dhcp4.conf
        mode: 0444
    # Bind mount the control socket dir so the pytest harness reaches it over AF_UNIX (replaces socat).
    volumes:
      - ./run-kea:/run/kea
    networks:
      server-net:
        ipv4_address: 10.99.0.3

  # Phase 1 relay. Classic behavior with no MAC policy so every client is relayed.
  relay:
    <<: *relay-base
    profiles: ["classic"]
    command:
      - dhcp-relay
      - -dhcp-server-address=kea
      - -debug
      - -log-no-datetime

  # Phase 2 relay. Mounts and watches the policy file and polls it once per second.
  relay-policy:
    <<: *relay-base
    profiles: ["policy"]
    command:
      - dhcp-relay
      - -dhcp-server-address=kea
      - -mac-policy=/etc/dhcp-relay/policy.txt
      - -mac-policy-interval=1s
      - -debug
      - -log-no-datetime
    volumes:
      - ./macpolicy:/etc/dhcp-relay

  # Phase 3 relay. Its client-facing NIC is unnumbered (the init below flushes that IPv4) so the relay must
  # use the link map and RFC 3527 Link Selection to relay. giaddr auto-derives from the server-facing address.
  relay-unnumbered:
    <<: *relay-base
    profiles: ["unnumbered"]
    command:
      - dhcp-relay
      - -dhcp-server-address=kea
      - -link-map=/etc/dhcp-relay/link-map.txt
      - -link-map-interval=1s
      - -debug
      - -log-no-datetime
    volumes:
      - ./linkmap:/etc/dhcp-relay

  # Shares the relay netns and strips the client-net IPv4 so the relay sees an unnumbered ingress. Exits after flushing.
  relay-unnumbered-init:
    <<: *netinit-base
    profiles: ["unnumbered"]
    network_mode: "service:relay-unnumbered"
    depends_on:
      relay-unnumbered:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        ip -4 addr flush to 192.168.50.0/24
        echo "unnumbered-init: flushed client-net IPv4"

  # perfdhcp load generator for the benchmark. Fabricates many MACs from one NIC and
  # broadcasts as a client through the relay, so promiscuous mode is required to catch
  # the relayed replies addressed to those fabricated MACs. Run via docker compose run.
  perfdhcp:
    build:
      context: .
      dockerfile_inline: |
        FROM debian:13-slim
        RUN apt-get update \
         && apt-get install -y --no-install-recommends kea-admin iproute2 \
         && rm -rf /var/lib/apt/lists/* \
         && command -v perfdhcp
    image: dhcp-relay-perfdhcp:e2e
    profiles: ["bench"]
    cap_add:
      - NET_RAW
      - NET_ADMIN
    entrypoint: ["/bin/sh", "-c", "ip link set eth0 promisc on && exec perfdhcp \"$$@\"", "--"]
    networks:
      client-net: {}

  # Allowed client. Relayed in phase 1 and default action in phase 2.
  client:
    <<: *client-base
    networks:
      client-net:
        mac_address: "02:00:00:00:00:01"

  # Forward blackholed in phase 2. Just a second distinct client in phase 1.
  client-denied:
    <<: *client-base
    networks:
      client-net:
        mac_address: "02:00:00:00:00:02"

  # Absent from the phase 2 policy so it is denied by the strict allow list fallback.
  client-unlisted:
    <<: *client-base
    networks:
      client-net:
        mac_address: "02:00:00:00:00:04"

  # Forwarded in phase 2 but its reply is blackholed on the reverse path.
  client-reply-drop:
    <<: *client-base
    networks:
      client-net:
        mac_address: "02:00:00:00:00:05"

  # Non relayed negative control. Talks to kea directly on server-net.
  client-direct:
    <<: *client-base
    networks:
      server-net: {}

  # Release client. Applies its lease and a host route to the server via the relay so the
  # unicast RELEASE udhcpc sends on quit traverses the relay. Uses the numbered classic relay.
  client-release:
    image: busybox:latest
    profiles: ["probe"]
    cap_add:
      - NET_RAW
      - NET_ADMIN
    entrypoint: ["/bin/sh", "/run-release.sh"]
    volumes:
      - ./udhcpc-release.sh:/release.sh:ro
      - ./udhcpc-run-release.sh:/run-release.sh:ro
    networks:
      client-net:
        mac_address: "02:00:00:00:00:06"

  # Unnumbered relay with an explicit giaddr override. Mutually exclusive profile so it reuses the
  # relay static addresses. giaddr is forced to a value the relay does not own to prove the override.
  relay-unnumbered-giaddr:
    <<: *relay-base
    profiles: ["giaddr"]
    command:
      - dhcp-relay
      - -dhcp-server-address=kea
      - -link-map=/etc/dhcp-relay/link-map.txt
      - -giaddr=203.0.113.1
      - -debug
      - -log-no-datetime
    volumes:
      - ./linkmap:/etc/dhcp-relay

  # Flushes the client-net IPv4 for the giaddr variant, same role as relay-unnumbered-init.
  relay-unnumbered-giaddr-init:
    <<: *netinit-base
    profiles: ["giaddr"]
    network_mode: "service:relay-unnumbered-giaddr"
    depends_on:
      relay-unnumbered-giaddr:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        ip -4 addr flush to 192.168.50.0/24
        echo "unnumbered-init: flushed client-net IPv4"

  # Chained-relay hop limit. -max-hops 1 makes a single already-relayed hop (perfdhcp) trip the drop.
  relay-maxhops:
    <<: *relay-base
    profiles: ["maxhops"]
    command:
      - dhcp-relay
      - -dhcp-server-address=kea
      - -max-hops=1
      - -debug
      - -log-no-datetime

  # Numbered relay whose ingress NIC gets a second IPv4 from the init below so the relay relays one
  # copy per address. Mutually exclusive profile reuses the relay static addresses.
  relay-multihomed:
    <<: *relay-base
    profiles: ["multihomed"]
    command:
      - dhcp-relay
      - -dhcp-server-address=kea
      - -debug
      - -log-no-datetime

  # Adds a second client-net IPv4 to the multihomed relay then exits.
  relay-multihomed-init:
    <<: *netinit-base
    profiles: ["multihomed"]
    network_mode: "service:relay-multihomed"
    depends_on:
      relay-multihomed:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        dev=$$(ip -4 -o addr show to 192.168.50.0/24 | awk '{print $$2}' | head -1)
        ip -4 addr add 192.168.50.5/24 dev "$$dev"
        echo "multihomed-init: added second client-net IPv4 on $$dev"

  # Second DHCP server for the per-client forward test. Same image and config as kea at a distinct address.
  kea2:
    image: dhcp-relay-kea:e2e
    profiles: ["twoserver"]
    environment:
      KEA_TEST_SEND_RESPONSES_TO_SOURCE: ENABLE
    configs:
      - source: kea-dhcp4
        target: /etc/kea/kea-dhcp4.conf
        mode: 0444
    networks:
      server-net:
        ipv4_address: 10.99.0.4

  # Relay that forwards one client to kea2 by policy and everyone else to the default server.
  relay-twoserver:
    <<: *relay-base
    profiles: ["twoserver"]
    command:
      - dhcp-relay
      - -dhcp-server-address=kea
      - -mac-policy=/etc/dhcp-relay/policy.txt
      - -mac-policy-interval=1s
      - -debug
      - -log-no-datetime
    volumes:
      - ./macpolicy:/etc/dhcp-relay
    depends_on:
      kea:
        condition: service_started
      kea2:
        condition: service_started

  # Crafts an INIT-REBOOT DHCPREQUEST for an out-of-subnet address to force a NAK from kea.
  nak-client:
    image: python:3-alpine
    profiles: ["probe"]
    entrypoint: ["python3", "/nak-request.py"]
    volumes:
      - ./nak-request.py:/nak-request.py:ro
    networks:
      client-net:
        mac_address: "02:00:00:00:00:07"

networks:
  client-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.50.0/24
  server-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.99.0.0/24

configs:
  kea-dhcp4:
    content: |
      {
        "Dhcp4": {
          "interfaces-config": { "interfaces": ["*"] },
          "control-socket": {
            "socket-type": "unix",
            "socket-name": "/run/kea/kea4-ctrl-socket"
          },
          "lease-database": { "type": "memfile", "persist": false },
          "store-extended-info": true,
          "echo-client-id": false,
          "authoritative": true,
          "hooks-libraries": [
            { "library": "@HOOKS_DIR@/libdhcp_lease_cmds.so" },
            { "library": "@HOOKS_DIR@/libdhcp_stat_cmds.so" }
          ],
          "valid-lifetime": 600,
          "renew-timer": 200,
          "rebind-timer": 400,
          "expired-leases-processing": {
            "reclaim-timer-wait-time": 10,
            "flush-reclaimed-timer-wait-time": 25,
            "hold-reclaimed-time": 60
          },
          "subnet4": [
            {
              "id": 1,
              "subnet": "192.168.50.0/24",
              "pools": [ { "pool": "192.168.50.10 - 192.168.50.250" } ],
              "relay": { "ip-addresses": ["192.168.50.2"] }
            }
          ],
          "loggers": [
            {
              "name": "kea-dhcp4",
              "output_options": [ { "output": "stdout" } ],
              "severity": "INFO"
            }
          ]
        }
      }
