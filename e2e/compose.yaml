name: dhcp-relay-e2e

# Shared relay config anchor. Mutually exclusive profiles prevent starting both on duplicate static addresses.
x-relay-base: &relay-base
  build:
    context: ../
    dockerfile: Dockerfile
  image: dhcp-relay:e2e
  cap_add:
    - NET_RAW
  networks:
    client-net:
      ipv4_address: 192.168.50.2
    server-net:
      ipv4_address: 10.99.0.2
  depends_on:
    kea:
      condition: service_started

# Shared client config anchor. Probe clients run udhcpc under the probe profile so they never auto start.
x-client-base: &client-base
  image: busybox:latest
  profiles: ["probe"]
  cap_add:
    - NET_RAW
    - NET_ADMIN
  entrypoint: ["udhcpc"]

services:
  kea:
    build:
      context: .
      dockerfile_inline: |
        FROM debian:13-slim
        RUN apt-get update \
         && apt-get install -y --no-install-recommends kea-dhcp4-server socat \
         && rm -rf /var/lib/apt/lists/* \
         && mkdir -p /run/kea
        COPY --chmod=0755 kea-entrypoint.sh /usr/local/bin/kea-entrypoint.sh
        ENTRYPOINT ["/usr/local/bin/kea-entrypoint.sh"]
    image: dhcp-relay-kea:e2e
    configs:
      - source: kea-dhcp4
        target: /etc/kea/kea-dhcp4.conf
        mode: 0444
    networks:
      server-net:
        ipv4_address: 10.99.0.3

  # Phase 1 relay. Classic behavior with no MAC policy so every client is relayed.
  relay:
    <<: *relay-base
    profiles: ["classic"]
    command:
      - dhcp-relay
      - -dhcp-server-address=kea
      - -debug
      - -log-no-datetime

  # Phase 2 relay. Mounts and watches the policy file and polls it once per second.
  relay-policy:
    <<: *relay-base
    profiles: ["policy"]
    command:
      - dhcp-relay
      - -dhcp-server-address=kea
      - -mac-policy=/etc/dhcp-relay/policy.txt
      - -mac-policy-interval=1s
      - -debug
      - -log-no-datetime
    volumes:
      - ./macpolicy:/etc/dhcp-relay

  # perfdhcp load generator for the scale gate and benchmark. Fabricates many MACs
  # from one NIC so promiscuous mode is required. Run via docker compose run.
  perfdhcp:
    build:
      context: .
      dockerfile_inline: |
        FROM debian:13-slim
        RUN apt-get update \
         && apt-get install -y --no-install-recommends kea-admin iproute2 \
         && rm -rf /var/lib/apt/lists/* \
         && command -v perfdhcp
    image: dhcp-relay-perfdhcp:e2e
    profiles: ["scale"]
    cap_add:
      - NET_RAW
      - NET_ADMIN
    entrypoint: ["/bin/sh", "-c", "ip link set eth0 promisc on && exec perfdhcp \"$$@\"", "--"]
    networks:
      client-net: {}

  # Allowed client. Relayed in phase 1 and default action in phase 2.
  client:
    <<: *client-base
    networks:
      client-net:
        mac_address: "02:00:00:00:00:01"

  # Forward blackholed in phase 2. Just a second distinct client in phase 1.
  client-denied:
    <<: *client-base
    networks:
      client-net:
        mac_address: "02:00:00:00:00:02"

  # Absent from the phase 2 policy so it is denied by the strict allow list fallback.
  client-unlisted:
    <<: *client-base
    networks:
      client-net:
        mac_address: "02:00:00:00:00:04"

  # Forwarded in phase 2 but its reply is blackholed on the reverse path.
  client-reply-drop:
    <<: *client-base
    networks:
      client-net:
        mac_address: "02:00:00:00:00:05"

  # Non relayed negative control. Talks to kea directly on server-net.
  client-direct:
    <<: *client-base
    networks:
      server-net: {}

networks:
  client-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.50.0/24
  server-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.99.0.0/24

configs:
  kea-dhcp4:
    content: |
      {
        "Dhcp4": {
          "interfaces-config": { "interfaces": ["*"] },
          "control-socket": {
            "socket-type": "unix",
            "socket-name": "/run/kea/kea4-ctrl-socket"
          },
          "lease-database": { "type": "memfile", "persist": false },
          "store-extended-info": true,
          "echo-client-id": false,
          "hooks-libraries": [
            { "library": "@HOOKS_DIR@/libdhcp_lease_cmds.so" },
            { "library": "@HOOKS_DIR@/libdhcp_stat_cmds.so" }
          ],
          "valid-lifetime": 600,
          "renew-timer": 200,
          "rebind-timer": 400,
          "expired-leases-processing": {
            "reclaim-timer-wait-time": 10,
            "flush-reclaimed-timer-wait-time": 25,
            "hold-reclaimed-time": 60
          },
          "subnet4": [
            {
              "id": 1,
              "subnet": "192.168.50.0/24",
              "pools": [ { "pool": "192.168.50.10 - 192.168.50.250" } ],
              "relay": { "ip-addresses": ["192.168.50.2"] }
            }
          ],
          "loggers": [
            {
              "name": "kea-dhcp4",
              "output_options": [ { "output": "stdout" } ],
              "severity": "INFO"
            }
          ]
        }
      }
